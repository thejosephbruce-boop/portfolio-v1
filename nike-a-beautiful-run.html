<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nike — A Beautiful Run · Joe Bruce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f5f3ef;
      --ink:    #111111;
      --muted:  #888880;
      --border: rgba(17, 17, 17, 0.12);
      --pad:    clamp(1.5rem, 5vw, 4rem);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem var(--pad);
      border-bottom: 1px solid transparent;
      transition: background 0.3s, border-color 0.3s;
    }
    .nav.scrolled {
      background: rgba(245, 243, 239, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: var(--border);
    }
    .nav-back {
      font-size: 0.7rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    .nav-back:hover { opacity: 1; }
    .nav-back::before { content: '←'; font-size: 0.9rem; letter-spacing: 0; }
    .nav-logo {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    /* ── PROJECT HEADER ──────────────────────── */
    .project-header {
      padding: calc(5.5rem + var(--pad)) var(--pad) 4.5rem;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    .project-client {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .project-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 300;
      line-height: 1.06;
      margin-bottom: 2rem;
    }
    .project-brief {
      font-size: 0.93rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 580px;
      margin: 0 auto;
    }

    /* ── MEDIA BLOCKS ────────────────────────── */
    .media-full {
      width: 100%;
      line-height: 0;
      margin-bottom: 3px;
    }
    .media-full img {
      width: 100%;
      display: block;
    }

    /* Contained (narrower) block for square social cut */
    .media-contained {
      padding: 0 var(--pad);
      margin-bottom: 3px;
    }
    .media-contained .video-wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── VIDEO PLAYER ────────────────────────── */
    .video-wrap {
      position: relative;
      background: #0d0d0d;
      cursor: pointer;
      line-height: 0;
    }
    .video-wrap video {
      width: 100%;
      display: block;
    }
    /* Custom play overlay — visible until first play */
    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.22);
      transition: opacity 0.35s;
    }
    .video-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(245, 243, 239, 0.55);
      background: rgba(245, 243, 239, 0.1);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s, background 0.25s;
    }
    .video-wrap:hover .play-btn {
      transform: scale(1.08);
      background: rgba(245, 243, 239, 0.2);
    }
    .play-btn::after {
      content: '';
      width: 0; height: 0;
      border-style: solid;
      border-width: 9px 0 9px 17px;
      border-color: transparent transparent transparent rgba(245, 243, 239, 0.9);
      margin-left: 4px;
    }


    /* ── NEXT PROJECT ────────────────────────── */
    .next-project {
      border-top: 1px solid var(--border);
      padding: 3.5rem var(--pad) 4rem;
      text-align: center;
    }
    .next-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }
    .next-link {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }
    .next-link:hover { opacity: 0.45; }
    .next-link::after { content: '→'; font-style: normal; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
      .media-contained { padding: 0; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav-back">Work</a>
    <a href="index.html" class="nav-logo">Joe Bruce</a>
  </nav>

  <!-- Project header -->
  <header class="project-header">
    <h1 class="project-title">Nike — A Beautiful Run</h1>
    <p class="project-brief">We were tasked with creating a social-first campaign to celebrate Eliud Kipchoge's unique outlook on running. The campaign also coincided with his fifth Berlin Marathon and the launch of his own Nike running collection.</p>
  </header>

  <!-- Main film — 1:04, 16:9 -->
  <div class="media-full">
    <div class="video-wrap"
         data-hls="https://video.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/99435470-2769-43df-8355-40d8782c1484/playlist.m3u8">
      <video
        poster="https://video.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/99435470-2769-43df-8355-40d8782c1484/thumbnail"
        preload="none"
        playsinline
      ></video>
      <div class="video-overlay">
        <div class="play-btn"></div>
      </div>
    </div>
  </div>

  <!-- Campaign still — road -->
  <div class="media-full">
    <img
      src="https://images.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/6f31d94b-0112-400f-a59e-51f32d6d48e8/NIKLGENK0321_01_HaveABeautifulRun_ROAD_STILL_1080x1080px_v02.jpeg?format=2500w"
      alt="Nike — A Beautiful Run, campaign still"
      loading="lazy"
    />
  </div>

  <!-- Campaign still — Kipchoge on grass -->
  <div class="media-full">
    <img
      src="https://images.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/c2b1dc4d-63dc-4287-b5a6-e943a3f47765/NIKLGENK0321_01_HaveABeautifulRun_REST_1_1+online+%281%29.jpeg?format=2500w"
      alt="Nike — A Beautiful Run, campaign still"
      loading="lazy"
    />
  </div>

  <!-- Square social cut — 0:10, 1:1 (contained) -->
  <div class="media-contained">
    <div class="video-wrap"
         data-hls="https://video.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/29476a4a-a9f3-43f4-a11b-0ad91a7671a5/playlist.m3u8">
      <video
        poster="https://video.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/29476a4a-a9f3-43f4-a11b-0ad91a7671a5/thumbnail"
        preload="none"
        playsinline
      ></video>
      <div class="video-overlay">
        <div class="play-btn"></div>
      </div>
    </div>
  </div>

  <!-- Wide social cut — 0:10, ~5:3 -->
  <div class="media-full">
    <div class="video-wrap"
         data-hls="https://video.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/8ffa08ae-5b58-4bb1-ae9b-34f2878fdfdd/playlist.m3u8">
      <video
        poster="https://video.squarespace-cdn.com/content/v1/6512f5ae617945473b691c71/8ffa08ae-5b58-4bb1-ae9b-34f2878fdfdd/thumbnail"
        preload="none"
        playsinline
      ></video>
      <div class="video-overlay">
        <div class="play-btn"></div>
      </div>
    </div>
  </div>

  <!-- Next project -->
  <nav class="next-project">
    <p class="next-label">Next project</p>
    <a href="#" class="next-link">Nike Like a Lioness</a>
  </nav>

  <!-- HLS.js for cross-browser video -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // ── Nav scroll ──────────────────────────────
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // ── Video players ───────────────────────────
    document.querySelectorAll('.video-wrap').forEach(wrap => {
      const video   = wrap.querySelector('video');
      const overlay = wrap.querySelector('.video-overlay');
      const hlsSrc  = wrap.dataset.hls;
      let   ready   = false;

      function initVideo() {
        if (ready) return;
        ready = true;

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          const hls = new Hls({ startLevel: -1 });
          hls.loadSource(hlsSrc);
          hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Safari — native HLS support
          video.src = hlsSrc;
        }

        // Show native controls after first load
        video.controls = true;
      }

      // Click on overlay or video → play/pause
      wrap.addEventListener('click', (e) => {
        initVideo();
        if (video.paused) {
          video.play();
        } else {
          video.pause();
        }
      });

      video.addEventListener('play',  () => overlay.classList.add('hidden'));
      video.addEventListener('pause', () => overlay.classList.remove('hidden'));
      video.addEventListener('ended', () => overlay.classList.remove('hidden'));
    });
  </script>

</body>
</html>
