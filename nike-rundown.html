  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f5f3ef;
      --ink:    #111111;
      --muted:  #888880;
      --border: rgba(17, 17, 17, 0.12);
      --pad:    clamp(1.5rem, 5vw, 4rem);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem var(--pad);
      border-bottom: 1px solid transparent;
      transition: background 0.3s, border-color 0.3s;
    }
    .nav.scrolled {
      background: rgba(245, 243, 239, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: var(--border);
    }
    .nav-back {
      font-size: 0.7rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    .nav-back:hover { opacity: 1; }
    .nav-back::before { content: '←'; font-size: 0.9rem; letter-spacing: 0; }
    .nav-label {
      font-size: 0.7rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    .nav-label:hover { opacity: 1; }

    /* ── PROJECT HEADER ──────────────────────── */
    .project-header {
      padding: calc(5.5rem + var(--pad)) var(--pad) 4.5rem;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    .project-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 300;
      line-height: 1.06;
      margin-bottom: 2rem;
    }
    .project-brief {
      font-size: 0.93rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 580px;
      margin: 0 auto;
    }

    /* ── MEDIA BLOCKS ────────────────────────── */
    .media-full {
      width: 100%;
      line-height: 0;
      margin-bottom: 3px;
    }
    .media-full img {
      width: 100%;
      display: block;
    }

    /* ── VIDEO PLAYER ────────────────────────── */
    .video-wrap {
      position: relative;
      background: #0d0d0d;
      cursor: pointer;
      line-height: 0;
    }
    .video-wrap video {
      width: 100%;
      display: block;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.22);
      transition: opacity 0.35s;
    }
    .video-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(245, 243, 239, 0.55);
      background: rgba(245, 243, 239, 0.1);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s, background 0.25s;
    }
    .video-wrap:hover .play-btn {
      transform: scale(1.08);
      background: rgba(245, 243, 239, 0.2);
    }
    .play-btn::after {
      content: '';
      width: 0; height: 0;
      border-style: solid;
      border-width: 9px 0 9px 17px;
      border-color: transparent transparent transparent rgba(245, 243, 239, 0.9);
      margin-left: 4px;
    }

    /* Smaller play button for grid clips */
    .play-btn--sm {
      width: 40px;
      height: 40px;
    }
    .play-btn--sm::after {
      border-width: 6px 0 6px 11px;
    }

    /* ── VIDEO GRID (short clips) ─────────────── */
    .media-grid-3-video {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }

    /* ── GIF GRID (contained, smaller) ─────── */
    .media-gif-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      margin: 3rem auto;
      padding: 0 var(--pad);
      max-width: 900px;
      line-height: 0;
    }
    .media-gif-grid img {
      width: 100%;
      display: block;
    }

    /* ── NEXT PROJECT ────────────────────────── */
    .next-project {
      border-top: 1px solid var(--border);
      padding: 3.5rem var(--pad) 4rem;
      text-align: center;
    }
    .next-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }
    .next-link {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }
    .next-link:hover { opacity: 0.45; }
    .next-link::after { content: '→'; font-style: normal; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 768px) {
      .media-grid-3-video { grid-template-columns: repeat(2, 1fr); }
      .media-gif-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .media-grid-3-video { grid-template-columns: 1fr; }
      .media-gif-grid { grid-template-columns: 1fr; padding: 0; }
    }
  </style>

  <!-- HLS.js for cross-browser video -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // ── Nav scroll ──────────────────────────────
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // ── Video players ───────────────────────────
    document.querySelectorAll('.video-wrap').forEach(wrap => {
      const video   = wrap.querySelector('video');
      const overlay = wrap.querySelector('.video-overlay');
      const hlsSrc  = wrap.dataset.hls;
      let   ready   = false;

      function initVideo() {
        if (ready) return;
        ready = true;

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          const hls = new Hls({ startLevel: -1 });
          hls.loadSource(hlsSrc);
          hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Safari — native HLS support
          video.src = hlsSrc;
        }

        // Show native controls after first load
        video.controls = true;
      }

      // Click on overlay or video → play/pause
      wrap.addEventListener('click', () => {
        initVideo();
        if (video.paused) {
          video.play();
        } else {
          video.pause();
        }
      });

      video.addEventListener('play',  () => overlay.classList.add('hidden'));
      video.addEventListener('pause', () => overlay.classList.remove('hidden'));
      video.addEventListener('ended', () => overlay.classList.remove('hidden'));
    });
  </script>
